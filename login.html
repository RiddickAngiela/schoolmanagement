<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management System | Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="login-body">

<div class="login-container">
    <div class="login-wrapper">
        <!-- Left Side - Login Form -->
        <div class="login-form-section">
            <div class="login-header">
                <div class="login-subtitle">
                    <i class="fas fa-school"></i> EduSystem
                </div>
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-description">Sign in to access your school management dashboard</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" placeholder="admin@school.com" required value="admin@school.com">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required value="password123">
                </div>
                <div class="forgot-password">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <!-- Quick Login Roles -->
            <div class="login-as-section">
                <div class="login-as-title">
                    <i class="fas fa-user-shield"></i> Quick Login As
                </div>
                <div class="role-buttons">
                    <button class="role-btn" data-role="admin"><i class="fas fa-user-cog"></i> Admin</button>
                    <button class="role-btn" data-role="teacher"><i class="fas fa-chalkboard-teacher"></i> Teacher</button>
                    <button class="role-btn" data-role="student"><i class="fas fa-user-graduate"></i> Student</button>
                    <button class="role-btn" data-role="parent"><i class="fas fa-user-friends"></i> Parent</button>
                </div>
            </div>

            <div class="login-footer">
                &copy; 2024 EduSystem. All rights reserved.
            </div>
        </div>

        <!-- Right Side - Image -->
        <div class="login-image-section">
            <div class="image-overlay"></div>
            <div class="image-content">
                <div class="brand-icon"><i class="fas fa-graduation-cap"></i></div>
                <h2>School Management Made Easy</h2>
                <p>Streamline your institution's operations with our comprehensive platform</p>
                <div class="buy-badge">
                    <i class="fas fa-star"></i> Premium System
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Check if already logged in
    if (sessionStorage.getItem('loggedIn') === 'true') {
        window.location.href = 'index.html';
        return;
    }

    const loginForm = document.getElementById('loginForm');
    const roleButtons = document.querySelectorAll('.role-btn');

    // Role-based login
    const roleCredentials = {
        admin: { email: 'admin@school.com', password: 'password123', role: 'admin' },
        teacher: { email: 'teacher@school.com', password: 'password123', role: 'teacher' },
        student: { email: 'student@school.com', password: 'password123', role: 'student' },
        parent: { email: 'parent@school.com', password: 'password123', role: 'parent' }
    };

    // Handle login form submission
    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!email || !password) {
            alert('Please enter both email and password.');
            return;
        }

        // Simple validation - accept any email with password
        sessionStorage.setItem('loggedIn', 'true');
        sessionStorage.setItem('userEmail', email);
        sessionStorage.setItem('userRole', 'admin');
        sessionStorage.setItem('loginTime', Date.now().toString());
        window.location.href = 'index.html';
    });

    // Handle role button clicks
    roleButtons.forEach(button => {
        button.addEventListener('click', function() {
            const role = this.getAttribute('data-role');
            const creds = roleCredentials[role];
            
            if (creds) {
                document.getElementById('email').value = creds.email;
                document.getElementById('password').value = creds.password;
                
                // Auto-login
                sessionStorage.setItem('loggedIn', 'true');
                sessionStorage.setItem('userEmail', creds.email);
                sessionStorage.setItem('userRole', creds.role);
                sessionStorage.setItem('loginTime', Date.now().toString());
                window.location.href = 'index.html';
            }
        });
    });

    // Enter key to submit
    document.querySelectorAll('#password, #email').forEach(input => {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    });
});
</script>

</body>
</html>
