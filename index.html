<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management System | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<header class="navbar">
    <div class="logo"><i class="fas fa-school"></i> EduSystem</div>
    <div class="nav-links">
        <a href="index.html" id="dashboardNavLink"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="#" id="profileNavLink"><i class="far fa-user-circle"></i> Profile</a>
        <a href="#" id="logoutBtnNav"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
</header>

<div class="app-wrapper">
    <aside class="sidebar">
        <div class="sidebar-nav">
            <ul>
                <li class="nav-item active" data-page="dashboard">
                    <a href="index.html"><i class="fas fa-chalkboard-user"></i> Dashboard</a>
                </li>
                <li class="nav-item" data-page="users">
                    <a href="users.html"><i class="fas fa-users"></i> Users</a>
                </li>
                <li class="nav-item" data-page="alumni">
                    <a href="alumni.html"><i class="fas fa-graduation-cap"></i> Alumni</a>
                </li>
                <li class="nav-item" data-page="academic">
                    <a href="#"><i class="fas fa-book-open"></i> Academic</a>
                </li>
                <li class="nav-item" data-page="liveclass">
                    <a href="#"><i class="fas fa-video"></i> Live class</a>
                </li>
                <li class="nav-item" data-page="examination">
                    <a href="#"><i class="fas fa-pen-alt"></i> Examination</a>
                </li>
                <li class="nav-item" data-page="accounting">
                    <a href="#"><i class="fas fa-calculator"></i> Accounting</a>
                </li>
                <li class="nav-item" data-page="backoffice">
                    <a href="#"><i class="fas fa-archive"></i> Back office</a>
                </li>
                <li class="nav-item" data-page="onlinecourses">
                    <a href="#"><i class="fas fa-laptop-code"></i> Online courses</a>
                </li>
                <li class="nav-item" data-page="settings">
                    <a href="#"><i class="fas fa-sliders-h"></i> Settings</a>
                </li>
            </ul>
        </div>
    </aside>

    <main class="main-content" id="mainContent">
        <div id="loadingSpinner" style="display: none; text-align: center; padding: 50px;">
            <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: #3b82f6;"></i>
        </div>
        <div id="dashboardContent"></div>
    </main>
</div>

<!-- Shared mock data -->
<script src="mock-data.js"></script>

<script>
// ==================== AUTHENTICATION ====================
function isLoggedIn() {
    return sessionStorage.getItem('loggedIn') === 'true';
}

function checkAuth() {
    if (!isLoggedIn()) {
        window.location.href = 'login.html';
        return false;
    }
    return true;
}

function getUserRole() {
    return sessionStorage.getItem('userRole') || 'admin';
}

function logout() {
    sessionStorage.clear();
    window.location.href = 'login.html';
}

// ==================== PAGE RENDERING ====================
function showLoading() {
    document.getElementById('loadingSpinner').style.display = 'block';
    document.getElementById('dashboardContent').style.display = 'none';
}

function hideLoading() {
    document.getElementById('loadingSpinner').style.display = 'none';
    document.getElementById('dashboardContent').style.display = 'block';
}

function showBlankPage(pageName) {
    showLoading();
    const displayName = pageName.charAt(0).toUpperCase() + pageName.slice(1);

    document.getElementById('dashboardContent').innerHTML = `
        <div class="blank-page">
            <div class="blank-page-icon"><i class="fas fa-file-alt"></i></div>
            <h1 class="blank-page-title">${displayName}</h1>
            <p class="blank-page-subtitle">This page is under construction</p>
            <div class="blank-page-message">
                <i class="fas fa-code-branch"></i>
                <span>Content will be added soon</span>
            </div>
            <a href="index.html" class="back-to-dashboard" id="backToDashboardBtn">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    `;

    document.getElementById('backToDashboardBtn').addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = 'index.html';
    });

    updateActiveNav(pageName);
    hideLoading();
}

function showDashboard() {
    showLoading();
    const role = getUserRole();
    const roleDisplay = role.charAt(0).toUpperCase() + role.slice(1);

    // Build invoice rows from mock data
    const invoiceRows = MOCK_INVOICES.map(inv => {
        const balance = inv.total - inv.paid;
        const statusClass = balance === 0 ? 'badge--status-active' : 'badge--status-inactive';
        const statusLabel = balance === 0 ? 'Paid' : 'Pending';
        return `
            <tr>
                <td>${inv.student}</td>
                <td>${inv.class}</td>
                <td>${inv.title}</td>
                <td>KES ${inv.total.toLocaleString()}</td>
                <td>
                    KES ${inv.paid.toLocaleString()}
                    <span class="badge ${statusClass}" style="margin-left:6px;font-size:11px;">${statusLabel}</span>
                </td>
            </tr>`;
    }).join('');

    document.getElementById('dashboardContent').innerHTML = `
        <div class="dashboard-header">
            <h1>Dashboard</h1>
            <div class="welcome-message">
                <i class="fas fa-user-circle"></i>
                <span>Welcome back, ${roleDisplay}!</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon-wrapper">
                    <i class="fas fa-user-graduate stat-icon-large" style="color:#3b82f6;"></i>
                </div>
                <div class="stat-number">${MOCK_STATS.students}</div>
                <div class="stat-label">Total Students</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon-wrapper">
                    <i class="fas fa-chalkboard-user stat-icon-large" style="color:#10b981;"></i>
                </div>
                <div class="stat-number">${MOCK_STATS.teachers}</div>
                <div class="stat-label">Total Teachers</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon-wrapper">
                    <i class="fas fa-user-tie stat-icon-large" style="color:#f59e0b;"></i>
                </div>
                <div class="stat-number">${MOCK_STATS.totalStaff}</div>
                <div class="stat-label">Total Staff</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon-wrapper">
                    <i class="fas fa-heart stat-icon-large" style="color:#ec489a;"></i>
                </div>
                <div class="stat-number">${MOCK_STATS.parents}</div>
                <div class="stat-label">Total Parents</div>
            </div>
        </div>

        <div class="accounts-section">
            <div class="section-title">
                <i class="fas fa-file-invoice-dollar"></i> Accounts of June
            </div>
            <div class="table-controls">
                <div class="entries-selector">
                    <span>Show</span>
                    <select id="entriesSelect">
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                    </select>
                    <span>entries</span>
                </div>
                <a href="users.html" class="btn btn--primary" style="margin-left:auto;">
                    <i class="fas fa-users"></i> Manage Users
                </a>
            </div>

            <table class="invoice-table">
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Class</th>
                        <th>Invoice title</th>
                        <th>Total amount</th>
                        <th>Paid amount</th>
                    </tr>
                </thead>
                <tbody id="invoiceTableBody">
                    ${invoiceRows}
                </tbody>
            </table>
        </div>

        <div class="attendance-card">
            <div class="attendance-left">
                <i class="fas fa-calendar-check attendance-icon"></i>
                <div>
                    <div class="attendance-title">TODAY'S ATTENDANCE</div>
                    <div class="attendance-stats">
                        <span class="attendance-big-number">${MOCK_ATTENDANCE.present}</span>
                        <span class="attendance-text">STUDENTS ATTENDING TODAY</span>
                    </div>
                </div>
            </div>
            <a href="#" class="attendance-link" id="attendanceLink">
                Go to attendance <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    `;

    document.getElementById('attendanceLink').addEventListener('click', function(e) {
        e.preventDefault();
        showBlankPage('attendance');
    });

    updateActiveNav('dashboard');
    hideLoading();
}

function updateActiveNav(pageName) {
    document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
        if (item.getAttribute('data-page') === pageName) {
            item.classList.add('active');
        }
    });
}

// ==================== INITIALIZATION ====================
document.addEventListener('DOMContentLoaded', function() {
    if (!checkAuth()) return;

    // Handle sidebar navigation - only intercept non-existent pages
    document.querySelectorAll('.nav-item').forEach(item => {
        const link = item.querySelector('a');
        const href = link.getAttribute('href');
        
        // If href is '#', it's a placeholder - intercept and show blank page
        if (href === '#') {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                const page = this.getAttribute('data-page');
                showBlankPage(page);
            });
        }
        // If href points to an actual HTML file, let it navigate normally
        // No need to add event listener - default behavior works
    });

    // Top navigation
    document.getElementById('profileNavLink').addEventListener('click', function(e) {
        e.preventDefault();
        showBlankPage('profile');
    });

    document.getElementById('logoutBtnNav').addEventListener('click', function(e) {
        e.preventDefault();
        logout();
    });

    // Show the dashboard
    showDashboard();
});

window.addEventListener('pageshow', function(event) {
    if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
        checkAuth();
    }
});
</script>

</body>
</html>
